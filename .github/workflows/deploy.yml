# .github/workflows/deploy.yml — Enterprise stage, adapted for MiniStack
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/_build.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      # 1. Download the frontend asset from your build job
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # 2. Start MiniStack in the background of the runner
      - name: Start MiniStack Service
        run: |
          docker run -d -p 4566:4566 ministackorg/ministack
          # Give MiniStack a few seconds to spin up completely
          sleep 5

      # 3. Create the mock S3 Bucket inside MiniStack
      - name: Create Local S3 Bucket
        run: aws --endpoint-url=http://localhost:4566 s3 mb s3://pipelines
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-west

      # 4. Deploy your frontend to the local MiniStack bucket
      - name: Sync Frontend to MiniStack S3
        run: aws --endpoint-url=http://localhost:4566 s3 sync dist/ s3://pipelines/ --delete --checksum-algorithm SHA256
        

        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-west

      # 5. Optional: Verify upload by printing bucket contents to logs
      - name: Verify MiniStack Deployment
        run: aws --endpoint-url=http://localhost:4566 s3 ls s3://pipelines/
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-west
